name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  APP_NAME: lilygo-spark-ng
  APP_DISPLAY_NAME: "LILYGO Spark NG"
  APP_VERSION: "0.1.0"
  APP_IDENTIFIER: "cc.lilygo.spark-ng"

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      should_release: ${{ steps.check.outputs.should_release }}
      tag_name: ${{ steps.tag.outputs.tag_name }}
      release_name: ${{ steps.tag.outputs.release_name }}
      is_prerelease: ${{ steps.tag.outputs.is_prerelease }}
    steps:
      - uses: actions/checkout@v4

      - name: Check if release needed
        id: check
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "should_release=false" >> $GITHUB_OUTPUT
          else
            echo "should_release=true" >> $GITHUB_OUTPUT
          fi

      - name: Generate tag name
        if: steps.check.outputs.should_release == 'true'
        id: tag
        run: |
          TIME_STR=$(date -u +'%Y%m%d.%H%M%S')
          SHA_SHORT=$(echo ${{ github.sha }} | cut -c1-7)

          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            TAG_NAME=${{ github.ref_name }}
            echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT
            echo "release_name=${TAG_NAME}" >> $GITHUB_OUTPUT
            echo "is_prerelease=false" >> $GITHUB_OUTPUT
          else
            TAG_NAME="v${{ env.APP_VERSION }}-canary.${TIME_STR}"
            echo "tag_name=${TAG_NAME}" >> $GITHUB_OUTPUT
            echo "release_name=Canary ${TAG_NAME} (${SHA_SHORT})" >> $GITHUB_OUTPUT
            echo "is_prerelease=true" >> $GITHUB_OUTPUT
          fi

      - name: Create Release
        if: steps.check.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag_name }}
          name: ${{ steps.tag.outputs.release_name }}
          body: |
            Automated build for commit `${{ github.sha }}`
            Triggered by: `${{ github.event_name }}`
          prerelease: ${{ steps.tag.outputs.is_prerelease }}
          generate_release_notes: true

  build-macos:
    needs: setup
    runs-on: macos-latest
    strategy:
      matrix:
        target: [x86_64-apple-darwin, aarch64-apple-darwin]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Metal Toolchain
        run: xcodebuild -downloadComponent MetalToolchain || true

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build (Release)
        run: cargo build --release --target ${{ matrix.target }}

      - name: Create .app bundle
        run: |
          APP_BUNDLE="${{ env.APP_DISPLAY_NAME }}.app"
          mkdir -p "dist/${APP_BUNDLE}/Contents/MacOS"
          mkdir -p "dist/${APP_BUNDLE}/Contents/Resources"

          cp "target/${{ matrix.target }}/release/${{ env.APP_NAME }}" "dist/${APP_BUNDLE}/Contents/MacOS/"

          mkdir -p AppIcon.iconset
          SRC="resources/app-icon.png"
          sips -z 16 16     "$SRC" --out AppIcon.iconset/icon_16x16.png
          sips -z 32 32     "$SRC" --out AppIcon.iconset/icon_16x16@2x.png
          sips -z 32 32     "$SRC" --out AppIcon.iconset/icon_32x32.png
          sips -z 64 64     "$SRC" --out AppIcon.iconset/icon_32x32@2x.png
          sips -z 128 128   "$SRC" --out AppIcon.iconset/icon_128x128.png
          sips -z 256 256   "$SRC" --out AppIcon.iconset/icon_128x128@2x.png
          sips -z 256 256   "$SRC" --out AppIcon.iconset/icon_256x256.png
          sips -z 512 512   "$SRC" --out AppIcon.iconset/icon_256x256@2x.png
          sips -z 512 512   "$SRC" --out AppIcon.iconset/icon_512x512.png
          sips -z 1024 1024 "$SRC" --out AppIcon.iconset/icon_512x512@2x.png
          iconutil -c icns AppIcon.iconset -o "dist/${APP_BUNDLE}/Contents/Resources/AppIcon.icns"
          rm -rf AppIcon.iconset

          cat > "dist/${APP_BUNDLE}/Contents/Info.plist" << PLIST
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>${{ env.APP_DISPLAY_NAME }}</string>
            <key>CFBundleIdentifier</key>
            <string>${{ env.APP_IDENTIFIER }}</string>
            <key>CFBundleVersion</key>
            <string>${{ env.APP_VERSION }}</string>
            <key>CFBundleShortVersionString</key>
            <string>${{ env.APP_VERSION }}</string>
            <key>CFBundleExecutable</key>
            <string>${{ env.APP_NAME }}</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>CFBundleIconFile</key>
            <string>AppIcon</string>
            <key>NSHighResolutionCapable</key>
            <true/>
            <key>LSMinimumSystemVersion</key>
            <string>10.15.7</string>
          </dict>
          </plist>
          PLIST

      - name: Create DMG
        run: |
          create-dmg \
            --volname "${{ env.APP_DISPLAY_NAME }}" \
            --window-pos 200 120 \
            --window-size 600 400 \
            --icon-size 100 \
            --icon "${{ env.APP_DISPLAY_NAME }}.app" 175 190 \
            --app-drop-link 425 190 \
            --skip-jenkins \
            --hdiutil-retries 15 \
            "${{ env.APP_NAME }}-macos-${{ matrix.target }}.dmg" \
            "dist/" \
          || true

          if [ ! -f "${{ env.APP_NAME }}-macos-${{ matrix.target }}.dmg" ]; then
            echo "create-dmg failed, falling back to zip"
            cd dist
            zip -r "../${{ env.APP_NAME }}-macos-${{ matrix.target }}.zip" "${{ env.APP_DISPLAY_NAME }}.app"
            cd ..
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-macos-${{ matrix.target }}
          path: |
            ${{ env.APP_NAME }}-macos-${{ matrix.target }}.dmg
            ${{ env.APP_NAME }}-macos-${{ matrix.target }}.zip
          if-no-files-found: ignore

      - name: Upload to Release
        if: needs.setup.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.setup.outputs.tag_name }}
          files: |
            ${{ env.APP_NAME }}-macos-${{ matrix.target }}.dmg
            ${{ env.APP_NAME }}-macos-${{ matrix.target }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-windows:
    needs: setup
    runs-on: windows-latest
    strategy:
      matrix:
        target: [x86_64-pc-windows-msvc]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build (Release)
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package Windows
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "target/${{ matrix.target }}/release/${{ env.APP_NAME }}.exe" "dist/"
          if (Test-Path "resources/app-icon.png") { Copy-Item "resources/app-icon.png" "dist/" }
          if (Test-Path "LICENSE") { Copy-Item "LICENSE" "dist/" }
          Compress-Archive -Path "dist/*" -DestinationPath "${{ env.APP_NAME }}-windows-${{ matrix.target }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-windows-${{ matrix.target }}
          path: ${{ env.APP_NAME }}-windows-${{ matrix.target }}.zip

      - name: Upload to Release
        if: needs.setup.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.setup.outputs.tag_name }}
          files: ${{ env.APP_NAME }}-windows-${{ matrix.target }}.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-linux:
    needs: setup
    runs-on: ubuntu-latest
    strategy:
      matrix:
        target: [x86_64-unknown-linux-gnu]
    steps:
      - uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc g++ cmake clang lld \
            libasound2-dev \
            libfontconfig-dev \
            libglib2.0-dev \
            libssl-dev \
            libvulkan1 \
            libwayland-dev \
            libx11-xcb-dev \
            libxkbcommon-x11-dev \
            libzstd-dev

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build (Release)
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package Linux
        run: |
          mkdir -p dist/${{ env.APP_NAME }}
          cp "target/${{ matrix.target }}/release/${{ env.APP_NAME }}" "dist/${{ env.APP_NAME }}/"
          if [ -f resources/app-icon.png ]; then cp resources/app-icon.png "dist/${{ env.APP_NAME }}/"; fi
          if [ -f LICENSE ]; then cp LICENSE "dist/${{ env.APP_NAME }}/"; fi
          if [ -f README.md ]; then cp README.md "dist/${{ env.APP_NAME }}/"; fi
          cd dist
          tar czf "../${{ env.APP_NAME }}-linux-${{ matrix.target }}.tar.gz" "${{ env.APP_NAME }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}-linux-${{ matrix.target }}
          path: ${{ env.APP_NAME }}-linux-${{ matrix.target }}.tar.gz

      - name: Upload to Release
        if: needs.setup.outputs.should_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.setup.outputs.tag_name }}
          files: ${{ env.APP_NAME }}-linux-${{ matrix.target }}.tar.gz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  cleanup:
    needs: [setup, build-macos, build-windows, build-linux]
    if: needs.setup.outputs.should_release == 'true' && needs.setup.outputs.is_prerelease == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup old canary releases
        run: |
          TAGS=$(gh release list --repo ${{ github.repository }} --limit 100 --json tagName,isPrerelease -q '[.[] | select(.isPrerelease) | .tagName] | .[10:][]')
          for TAG in $TAGS; do
            echo "Deleting old canary: $TAG"
            gh release delete "$TAG" --repo ${{ github.repository }} --yes --cleanup-tag 2>/dev/null || true
          done
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
