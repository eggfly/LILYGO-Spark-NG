name: Build & Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  APP_NAME: lilygo-spark-nt

jobs:
  build-macos:
    runs-on: macos-latest
    strategy:
      matrix:
        target: [x86_64-apple-darwin, aarch64-apple-darwin]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Metal Toolchain
        run: xcodebuild -downloadComponent MetalToolchain || true

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build (Release)
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package macOS app
        run: |
          mkdir -p dist
          APP_DIR="dist/LILYGO Spark NT.app/Contents/MacOS"
          mkdir -p "$APP_DIR"
          cp target/${{ matrix.target }}/release/${{ env.APP_NAME }} "$APP_DIR/"

          cat > "dist/LILYGO Spark NT.app/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>CFBundleName</key>
            <string>LILYGO Spark NT</string>
            <key>CFBundleIdentifier</key>
            <string>cc.lilygo.spark-nt</string>
            <key>CFBundleVersion</key>
            <string>0.1.0</string>
            <key>CFBundleExecutable</key>
            <string>lilygo-spark-nt</string>
            <key>CFBundlePackageType</key>
            <string>APPL</string>
            <key>NSHighResolutionCapable</key>
            <true/>
          </dict>
          </plist>
          PLIST

          cd dist
          zip -r "../LILYGO-Spark-NT-macos-${{ matrix.target }}.zip" "LILYGO Spark NT.app"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LILYGO-Spark-NT-macos-${{ matrix.target }}
          path: LILYGO-Spark-NT-macos-${{ matrix.target }}.zip

  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        target: [x86_64-pc-windows-msvc]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-${{ matrix.target }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-${{ matrix.target }}-cargo-

      - name: Build (Release)
        run: cargo build --release --target ${{ matrix.target }}

      - name: Package Windows
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          Copy-Item "target/${{ matrix.target }}/release/${{ env.APP_NAME }}.exe" "dist/"
          Compress-Archive -Path "dist/*" -DestinationPath "LILYGO-Spark-NT-windows-${{ matrix.target }}.zip"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LILYGO-Spark-NT-windows-${{ matrix.target }}
          path: LILYGO-Spark-NT-windows-${{ matrix.target }}.zip

  release:
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*.zip
          generate_release_notes: true
